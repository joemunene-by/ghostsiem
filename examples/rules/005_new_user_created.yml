title: New User Account Created
id: gs-005
status: stable
description: Detects creation of new user accounts via useradd or adduser.
author: GhostSIEM
date: 2026/01/01
logsource:
    product: linux
    service: auth
level: high
detection:
    selection_useradd:
        message|contains: "useradd"
    selection_adduser:
        message|contains: "adduser"
    selection_newuser:
        message|contains: "new user"
    condition: 1 of selection*
tags:
    - attack.persistence
    - attack.t1136.001
falsepositives:
    - Legitimate user management
